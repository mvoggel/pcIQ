name: Weekly feeder fund scan

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday 5am ET (9:00 UTC)
  workflow_dispatch:
    inputs:
      days:
        description: "Days to look back for new feeder fund filings"
        default: "7"
        required: false

# Scans EDGAR for new iCapital / CAIS access vehicle Form D filings
# from the past week and writes them to feeder_funds table.

jobs:
  feeder-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger feeder fund scan
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          echo "Scanning EDGAR for feeder fund filings over last ${DAYS} days..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            "https://pciq-production.up.railway.app/api/platforms/ingest/feeder?days=${DAYS}")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Feeder scan trigger failed with status $response"
            exit 1
          fi
          echo "Feeder scan started — runs in background. Checking stats in 90s..."

      - name: Wait for scan to complete
        run: sleep 90

      - name: Check platform stats
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            "https://pciq-production.up.railway.app/api/platforms/stats"
